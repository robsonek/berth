version: 2
project_name: berth
before:
  hooks:
    - go mod tidy
builds:
  - id: berth
    main: .
    binary: berth
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/robsonek/berth/internal/version.Version={{.Version}}
      - -X github.com/robsonek/berth/internal/version.Commit={{.ShortCommit}}
      - -X github.com/robsonek/berth/internal/version.Date={{.Date}}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"
release:
  draft: false
