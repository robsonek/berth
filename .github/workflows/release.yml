name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    # Surfaced as a job-level env so step `if:` conditions can read it
    # (the `secrets` context is not available directly in `if:`).
    env:
      BERTH_TEST_SERVER: ${{ secrets.BERTH_TEST_SERVER }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Unit tests
        run: go test -race ./...
      - name: Integration smoke test
        # Runs only when a disposable Debian 13 target is configured. The unit
        # tests above are the release gate; the live provision is opt-in
        # because it requires throwaway infrastructure CI may not have.
        if: ${{ env.BERTH_TEST_SERVER != '' }}
        run: go test -tags integration ./test/integration/...
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
